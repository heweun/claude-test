<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성장 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 36px 48px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #e94560;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: 0.9rem; opacity: .7; margin-top: 4px; }

    /* ── 공통 섹션 ── */
    .section {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }
    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 레이더 차트 ── */
    .radar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .radar-chart-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }
    .radar-legend {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }
    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── 시험 결과 ── */
    .score-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .score-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      text-align: center;
    }
    .score-card .label { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
    .score-card .score { font-size: 3rem; font-weight: 800; line-height: 1; }
    .score-card .total { font-size: 0.85rem; color: #999; margin-top: 4px; }
    .score-ot   .score { color: #0f3460; }
    .score-final .score { color: #e94560; }

    .bar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .bar-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .bar-chart-container { position: relative; }

    /* ── 데일리 스크럼 ── */
    .scrum-table-wrap {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .scrum-table {
      width: 100%;
      border-collapse: collapse;
    }
    .scrum-table thead tr {
      background: #0f3460;
      color: #fff;
    }
    .scrum-table th, .scrum-table td {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.875rem;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: top;
    }
    .scrum-table th { font-weight: 600; white-space: nowrap; }
    .scrum-table tr:last-child td { border-bottom: none; }
    .scrum-table tbody tr:hover { background: #f8f9ff; }
    .date-badge {
      display: inline-block;
      background: #eef1f8;
      color: #0f3460;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── 포트폴리오 ── */
    .portfolio-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .portfolio-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 12px;
    }
    .portfolio-card .description {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .skill-tag {
      background: #eef1f8;
      color: #0f3460;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .achievements {
      border-top: 1px solid #f0f2f5;
      padding-top: 20px;
    }
    .achievements h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 12px;
    }
    .achievement-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.875rem;
      color: #444;
    }
    .achievement-item::before {
      content: '▸';
      color: #e94560;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* 반응형 */
    @media (max-width: 640px) {
      header { padding: 24px 20px; }
      .section { padding: 0 12px; }
      .score-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="avatar">김</div>
  <div>
    <h1>김수강 · 성장 대시보드</h1>
    <p>풀스택 웹 개발 과정 · 2025년 1분기</p>
  </div>
</header>

<!-- ── 역량 레이더 차트 ── -->
<div class="section">
  <div class="section-title">📡 역량 변화 (수강 전 vs 후)</div>
  <div class="radar-wrap">
    <div class="radar-chart-container">
      <canvas id="radarChart"></canvas>
    </div>
    <div class="radar-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(59,130,246,.6);border:2px solid #3b82f6;"></div>
        <span>수강 전</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(233,69,96,.6);border:2px solid #e94560;"></div>
        <span>수강 후</span>
      </div>
    </div>
  </div>
</div>

<!-- ── 시험 결과 ── -->
<div class="section">
  <div class="section-title">📝 시험 결과</div>

  <div class="score-cards">
    <div class="score-card score-ot">
      <div class="label">OT 시험</div>
      <div class="score">62</div>
      <div class="total">/ 100점</div>
    </div>
    <div class="score-card score-final">
      <div class="label">최종 시험</div>
      <div class="score">88</div>
      <div class="total">/ 100점</div>
    </div>
  </div>

  <div class="bar-wrap">
    <div class="bar-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div><span>정답</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#facc15;"></div><span>시간초과</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8;"></div><span>모르겠음</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div><span>오답</span></div>
    </div>
    <div class="bar-chart-container">
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>

<!-- ── 데일리 스크럼 ── -->
<div class="section">
  <div class="section-title">🗓 데일리 스크럼</div>
  <div class="scrum-table-wrap">
    <table class="scrum-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>문제</th>
          <th>해결방안</th>
          <th>결과</th>
        </tr>
      </thead>
      <tbody id="scrumBody"></tbody>
    </table>
  </div>
</div>

<!-- ── 포트폴리오 ── -->
<div class="section">
  <div class="section-title">💼 포트폴리오</div>
  <div class="portfolio-card" id="portfolioCard"></div>
</div>

<div style="height: 48px;"></div>

<script>
/* ──────────────────────────────────────────
   데이터 (여기만 수정하면 전체 반영)
────────────────────────────────────────── */
const DATA = {
  student: { name: '김수강', course: '풀스택 웹 개발 과정' },

  radar: {
    labels: ['알고리즘', '자료구조', '데이터베이스', '네트워크', '운영체제', '협업능력'],
    before: [2, 3, 2, 1, 2, 4],
    after:  [4, 5, 4, 3, 3, 5],
  },

  exam: {
    ot:    62,
    final: 88,
    subjects: [
      { name: 'Python 기초',    correct: 8, timeout: 2, unknown: 1, wrong: 1 },
      { name: '자료구조',        correct: 6, timeout: 3, unknown: 2, wrong: 2 },
      { name: '데이터베이스',    correct: 7, timeout: 1, unknown: 1, wrong: 3 },
      { name: '웹 프레임워크',   correct: 9, timeout: 1, unknown: 0, wrong: 2 },
      { name: '알고리즘',        correct: 5, timeout: 4, unknown: 2, wrong: 1 },
    ],
  },

  scrum: [
    { date: '03/25', problem: 'Git 브랜치 전략 이해 부족', solution: '팀원과 페어 프로그래밍으로 플로우 정리', result: 'feature 브랜치 독립 운영 성공' },
    { date: '03/26', problem: 'SQL JOIN 쿼리 성능 저하', solution: 'EXPLAIN 분석 후 인덱스 추가', result: '쿼리 응답 속도 60% 개선' },
    { date: '03/27', problem: 'Django ORM N+1 문제 발생', solution: 'select_related / prefetch_related 적용', result: 'DB 호출 횟수 12→2회로 감소' },
    { date: '03/28', problem: 'REST API 인증 토큰 만료 처리 누락', solution: '미들웨어에 토큰 갱신 로직 추가', result: '세션 유지 안정화 완료' },
    { date: '03/31', problem: '배포 시 환경변수 누락으로 서비스 오류', solution: '.env.example 파일 관리 체계 수립', result: '팀 전체 배포 가이드 문서화' },
    { date: '04/01', problem: '프론트엔드 차트 렌더링 성능 저하', solution: 'Chart.js 데이터 lazy loading 적용', result: '초기 로드 1.8s → 0.6s 개선' },
    { date: '04/02', problem: '코드 리뷰 피드백 반영 지연', solution: 'PR 템플릿과 체크리스트 도입', result: '리뷰 사이클 2일 → 반일로 단축' },
  ],
};

/* ──────────────────────────────────────────
   포트폴리오 — 스크럼 데이터 기반 자동 생성
────────────────────────────────────────── */
(function buildPortfolio() {
  const scrum = DATA.scrum;

  // 스크럼 문제·결과 키워드로 기술 스택 추론
  const keywordMap = {
    'Git': 'Git', 'SQL': 'SQL', 'Django': 'Django', 'ORM': 'Django ORM',
    'REST': 'REST API', 'API': 'REST API', '배포': 'Docker',
    'Chart': 'Chart.js', '프론트': 'JavaScript', 'PR': 'GitHub Actions',
  };
  const techSet = new Set();
  scrum.forEach(({ problem, solution }) => {
    Object.entries(keywordMap).forEach(([kw, tech]) => {
      if (problem.includes(kw) || solution.includes(kw)) techSet.add(tech);
    });
  });
  const techs = [...techSet].slice(0, 6);

  // 주요 성과: 결과 항목에서 수치가 있는 것만 추출
  const achievements = scrum
    .map(s => s.result)
    .filter(r => /[\d%회초s]/.test(r));

  const card = document.getElementById('portfolioCard');
  card.innerHTML = `
    <h3>풀스택 웹 서비스 개발 프로젝트</h3>
    <p class="description">
      본 과정에서 습득한 백엔드(Django REST Framework)와 프론트엔드(Vanilla JS + Chart.js) 기술을
      활용하여 팀 협업 기반의 데이터 시각화 웹 서비스를 구축했습니다.
      Git 워크플로우, DB 최적화, API 설계, 배포 자동화까지 풀스택 개발 사이클 전반을 경험했습니다.
    </p>
    <div class="skills-list">
      ${techs.map(t => `<span class="skill-tag">${t}</span>`).join('')}
      <span class="skill-tag">Python</span>
    </div>
    <div class="achievements">
      <h4>주요 성과 (스크럼 기반)</h4>
      ${achievements.map(a => `<div class="achievement-item">${a}</div>`).join('')}
    </div>
  `;
})();

/* ──────────────────────────────────────────
   데일리 스크럼 테이블
────────────────────────────────────────── */
(function buildScrum() {
  const tbody = document.getElementById('scrumBody');
  tbody.innerHTML = DATA.scrum.map(row => `
    <tr>
      <td><span class="date-badge">${row.date}</span></td>
      <td>${row.problem}</td>
      <td>${row.solution}</td>
      <td>${row.result}</td>
    </tr>
  `).join('');
})();

/* ──────────────────────────────────────────
   레이더 차트
────────────────────────────────────────── */
(function buildRadar() {
  const ctx = document.getElementById('radarChart').getContext('2d');
  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DATA.radar.labels,
      datasets: [
        {
          label: '수강 전',
          data: DATA.radar.before,
          backgroundColor: 'rgba(59,130,246,0.2)',
          borderColor: '#3b82f6',
          borderWidth: 2,
          pointBackgroundColor: '#3b82f6',
          pointRadius: 4,
        },
        {
          label: '수강 후',
          data: DATA.radar.after,
          backgroundColor: 'rgba(233,69,96,0.2)',
          borderColor: '#e94560',
          borderWidth: 2,
          pointBackgroundColor: '#e94560',
          pointRadius: 4,
        },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0,
          max: 5,
          ticks: { stepSize: 1, font: { size: 11 } },
          pointLabels: { font: { size: 13, weight: '600' } },
          grid: { color: 'rgba(0,0,0,.08)' },
          angleLines: { color: 'rgba(0,0,0,.08)' },
        },
      },
    },
  });
})();

/* ──────────────────────────────────────────
   가로 누적 바 차트
────────────────────────────────────────── */
(function buildBar() {
  const ctx = document.getElementById('barChart').getContext('2d');
  const subjects = DATA.exam.subjects;

  const toPercent = (s) => {
    const total = s.correct + s.timeout + s.unknown + s.wrong;
    return {
      correct: +(s.correct / total * 100).toFixed(1),
      timeout: +(s.timeout / total * 100).toFixed(1),
      unknown: +(s.unknown / total * 100).toFixed(1),
      wrong:   +(s.wrong   / total * 100).toFixed(1),
    };
  };

  const pct = subjects.map(toPercent);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: subjects.map(s => s.name),
      datasets: [
        { label: '정답',    data: pct.map(p => p.correct), backgroundColor: '#22c55e' },
        { label: '시간초과', data: pct.map(p => p.timeout), backgroundColor: '#facc15' },
        { label: '모르겠음', data: pct.map(p => p.unknown), backgroundColor: '#94a3b8' },
        { label: '오답',    data: pct.map(p => p.wrong),   backgroundColor: '#f87171' },
      ],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}%`,
          },
        },
      },
      scales: {
        x: {
          stacked: true,
          max: 100,
          ticks: { callback: v => v + '%', font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,.06)' },
        },
        y: {
          stacked: true,
          ticks: { font: { size: 12 } },
          grid: { display: false },
        },
      },
    },
  });
})();
</script>
</body>
</html>
