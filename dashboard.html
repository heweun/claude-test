<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성장 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 36px 48px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #e94560;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: 0.9rem; opacity: .7; margin-top: 4px; }

    /* ── 공통 섹션 ── */
    .section {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }
    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 레이더 차트 ── */
    .radar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .radar-chart-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }
    .radar-legend {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }
    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      header { padding: 24px 20px; }
      .section { padding: 0 12px; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="avatar">김</div>
  <div>
    <h1>김수강 · 성장 대시보드</h1>
    <p>풀스택 웹 개발 과정 · 2025년 1분기</p>
  </div>
</header>

<!-- ── 역량 레이더 차트 ── -->
<div class="section">
  <div class="section-title">📡 역량 변화 (수강 전 vs 후)</div>
  <div class="radar-wrap">
    <div class="radar-chart-container">
      <canvas id="radarChart"></canvas>
    </div>
    <div class="radar-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(59,130,246,.6);border:2px solid #3b82f6;"></div>
        <span>수강 전</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(233,69,96,.6);border:2px solid #e94560;"></div>
        <span>수강 후</span>
      </div>
    </div>
  </div>
</div>

<div style="height: 48px;"></div>
<script>
/* ── 레이더 데이터 ── */
const radarData = {
  labels: ['알고리즘', '자료구조', '데이터베이스', '네트워크', '운영체제', '협업능력'],
  before: [2, 3, 2, 1, 2, 4],
  after:  [4, 5, 4, 3, 3, 5],
};

(function buildRadar() {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  new Chart(canvas.getContext('2d'), {
    type: 'radar',
    data: {
      labels: radarData.labels,
      datasets: [
        {
          label: '수강 전',
          data: radarData.before,
          backgroundColor: 'rgba(59,130,246,0.2)',
          borderColor: '#3b82f6',
          borderWidth: 2,
          pointBackgroundColor: '#3b82f6',
          pointRadius: 4,
        },
        {
          label: '수강 후',
          data: radarData.after,
          backgroundColor: 'rgba(233,69,96,0.2)',
          borderColor: '#e94560',
          borderWidth: 2,
          pointBackgroundColor: '#e94560',
          pointRadius: 4,
        },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 5,
          ticks: { stepSize: 1, font: { size: 11 } },
          pointLabels: { font: { size: 13, weight: '600' } },
          grid: { color: 'rgba(0,0,0,.08)' },
          angleLines: { color: 'rgba(0,0,0,.08)' },
        },
      },
    },
  });
})();
</script>
</body>
</html>
