<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성장 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 36px 48px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.9rem;
      opacity: .7;
      margin-top: 4px;
    }

    .pdf-btn {
      margin-left: auto;
      padding: 10px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pdf-btn:hover {
      background: #c73652;
    }

    @media print {
      .pdf-btn {
        display: none;
      }

      .bar-wrap,
      .radar-wrap {
        break-inside: avoid;
      }

      /* 섹션 제목 직후 페이지 넘김 방지 */
      .section-title {
        break-after: avoid;
      }

      /* 스크럼 행: 각 행이 자연스럽게 페이지를 넘을 수 있도록 */
      .scrum-table tr {
        break-inside: avoid;
      }

      header {
        background: #1a1a2e !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .exam-bar {
        break-inside: avoid;
      }

      .exam-bar+.exam-bar {
        border-top: 1px solid #e2e8f0;
        padding-top: 24px;
      }

      /* 범례 색상 점 + 시험 배경색 출력 */
      .legend-dot,
      .bar-wrap,
      .exam-bar-title {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* 범례와 차트가 페이지 경계에서 분리되지 않도록 */

      /* 바 차트만 높이 제한 (레이더는 정사각형 유지) */
      .bar-wrap canvas {
        max-height: 200px !important;
        width: 100% !important;
      }

      /* 레이더 차트: 비율 유지하면서 크기 제한 */
      .radar-chart-container {
        max-width: 360px !important;
      }

      /* 섹션 간 여백 */
      .section {
        margin-top: 40px;
        margin-bottom: 40px;
      }
    }

    /* ── 공통 섹션 ── */
    .section {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 레이더 차트 ── */
    .radar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .radar-chart-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .radar-legend {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── 시험 결과 ── */
    /* ── 시험 탭 (점수 카드 자체가 탭) ── */
    .exam-score-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .exam-score-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
      text-align: center;
      border: 2px solid transparent;
    }

    .exam-score-card .label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 4px;
    }

    .exam-score-card .score {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .exam-score-card .total {
      font-size: 0.8rem;
      color: #999;
      margin-top: 2px;
    }

    .card-ot .score {
      color: #0f3460;
    }

    .card-ot {
      border-color: #0f3460;
    }

    .card-final .score {
      color: #e94560;
    }

    .card-final {
      border-color: #e94560;
    }

    .exam-bar {
      display: block;
    }

    .exam-bar+.exam-bar {
      margin-top: 24px;
    }

    .bar-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    /* ── 시험 결과 테이블 ── */
    .exam-table-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
    }

    .exam-table {
      width: 100%;
      border-collapse: collapse;
    }

    .exam-table th {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      padding: 6px 10px;
      text-align: left;
      border-bottom: 2px solid #f0f2f5;
    }

    .exam-table td {
      padding: 5px 10px;
      vertical-align: middle;
      font-size: 0.875rem;
    }

    .exam-table tr.row-ot td {
      border-top: 1px solid #f0f2f5;
      padding-top: 12px;
    }

    .exam-table .col-subject {
      font-weight: 700;
      color: #1a1a2e;
      white-space: nowrap;
      width: 110px;
    }

    .exam-table .col-type {
      white-space: nowrap;
      width: 42px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .col-type.ot {
      color: #0f3460;
    }

    .col-type.final {
      color: #e94560;
    }

    .exam-table .col-bar {
      width: 100%;
    }

    .bar-stack {
      display: flex;
      height: 34px;
      border-radius: 4px;
      overflow: hidden;
      background: #f0f2f5;
      position: relative;
      cursor: pointer;
    }

    .col-bar-unmeasured {
      display: flex;
      align-items: center;
    }

    .unmeasured-label {
      font-size: 0.85rem;
      color: #b0b8c8;
      font-style: italic;
      letter-spacing: 0.02em;
    }

    .bar-seg:hover {
      opacity: .75;
      cursor: pointer;
    }

    .bar-seg {
      height: 100%;
      transition: width .3s;
    }

    /* 커스텀 툴팁 */
    .bar-tooltip {
      display: none;
      position: fixed;
      background: rgba(26, 26, 46, .92);
      color: #fff;
      font-size: 0.78rem;
      padding: 8px 12px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      line-height: 1.8;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
    }

    /* ── 데일리 스크럼 ── */
    .scrum-table-wrap {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
    }

    .scrum-table {
      width: 100%;
      border-collapse: collapse;
    }

    .scrum-table thead tr {
      background: #0f3460;
      color: #fff;
    }

    .scrum-table th,
    .scrum-table td {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.875rem;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: top;
    }

    .scrum-table th {
      font-weight: 600;
      white-space: nowrap;
    }

    .scrum-table tr:last-child td {
      border-bottom: none;
    }

    .scrum-table tbody tr:hover {
      background: #f8f9ff;
    }

    .date-badge {
      display: inline-block;
      background: #eef1f8;
      color: #0f3460;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .scrum-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
    }

    .scrum-pagination button {
      padding: 6px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      color: #0f3460;
      cursor: pointer;
    }

    .scrum-pagination button:disabled {
      color: #ccc;
      cursor: default;
    }

    .scrum-pagination .page-info {
      font-size: 0.875rem;
      color: #666;
    }

    @media print {
      .scrum-pagination {
        display: none;
      }
    }

    /* ── 포트폴리오 ── */
    .portfolio-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
    }

    .portfolio-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 12px;
    }

    .portfolio-card .description {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .skill-tag {
      background: #eef1f8;
      color: #0f3460;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .achievements {
      border-top: 1px solid #f0f2f5;
      padding-top: 20px;
    }

    .achievements h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 12px;
    }

    .achievement-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.875rem;
      color: #444;
    }

    .achievement-item::before {
      content: '▸';
      color: #e94560;
      flex-shrink: 0;
      margin-top: 1px;
    }

    @media (max-width: 640px) {
      header {
        padding: 24px 20px;
      }

      .section {
        padding: 0 12px;
      }

      .score-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- ── 헤더 ── -->
  <header>
    <div class="avatar">김</div>
    <div>
      <h1>김수강 · 성장 대시보드</h1>
      <p>풀스택 웹 개발 과정 · 2025년 1분기</p>
    </div>
    <button class="pdf-btn" onclick="window.print()">PDF 다운로드</button>
  </header>

  <!-- ── 역량 레이더 차트 ── -->
  <div class="section">
    <div class="section-title">역량 변화 (수강 전 vs 후)</div>
    <div class="radar-wrap">
      <div class="radar-chart-container">
        <canvas id="radarChart"></canvas>
      </div>
      <div class="radar-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(59,130,246,.6);border:2px solid #3b82f6;"></div>
          <span>수강 전</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:rgba(233,69,96,.6);border:2px solid #e94560;"></div>
          <span>수강 후</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 포트폴리오 ── -->
  <div class="section">
    <div class="section-title">포트폴리오</div>
    <div class="portfolio-card" id="portfolioCard"></div>
  </div>

  <!-- ── 시험 결과 ── -->
  <div class="section">
    <div class="section-title">시험 결과</div>

    <!-- 점수 카드가 탭 역할 -->
    <div class="exam-score-cards">
      <div class="exam-score-card card-ot">
        <div class="label">사전 시험</div>
        <div class="score">62</div>
        <div class="total">/ 100점</div>
      </div>
      <div class="exam-score-card card-final">
        <div class="label">최종 시험</div>
        <div class="score">88</div>
        <div class="total">/ 100점</div>
      </div>
    </div>

    <!-- 과목별 OT/최종 비교 테이블 -->
    <div class="exam-table-wrap">
      <div class="bar-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#22c55e;"></div><span>정답</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#facc15;"></div><span>시간초과</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#94a3b8;"></div><span>모르겠음</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f87171;"></div><span>오답</span>
        </div>
      </div>
      <table class="exam-table" id="examTable">
        <thead>
          <tr>
            <th>과목</th>
            <th></th>
            <th>결과</th>
          </tr>
        </thead>
        <tbody id="examTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── 데일리 스크럼 ── -->
  <div class="section">
    <div class="section-title">데일리 스크럼</div>
    <div class="scrum-table-wrap">
      <table class="scrum-table">
        <thead>
          <tr>
            <th>날짜</th>
            <th>문제</th>
            <th>해결방안</th>
            <th>결과</th>
          </tr>
        </thead>
        <tbody id="scrumBody"></tbody>
      </table>
    </div>
    <div class="scrum-pagination" id="scrumPagination">
      <button id="scrumPrev" onclick="moveScrumPage(-1)">이전</button>
      <span class="page-info" id="scrumPageInfo"></span>
      <button id="scrumNext" onclick="moveScrumPage(1)">다음</button>
    </div>
  </div>

  <div id="barTooltip" class="bar-tooltip"></div>
  <div style="height: 48px;"></div>
  <script>
    /* ── 공통 유틸 ── */
    const escapeHtml = str =>
      str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

    /* ── 레이더 데이터 ── */
    const radarData = Object.freeze({
      labels: ['기획·도메인', 'CS 기초', '개발·구현', 'AI 활용', '품질·보안', '협업·성장'],
      before: [2, 3, 2, 1, 2, 4],
      after: [4, 5, 4, 3, 3, 5],
    });

    (function buildRadar() {
      const canvas = document.getElementById('radarChart');
      if (!canvas) return;
      new Chart(canvas.getContext('2d'), {
        type: 'radar',
        data: {
          labels: radarData.labels,
          datasets: [
            {
              label: '수강 전',
              data: radarData.before,
              backgroundColor: 'rgba(59,130,246,0.2)',
              borderColor: '#3b82f6',
              borderWidth: 2,
              pointBackgroundColor: '#3b82f6',
              pointRadius: 4,
            },
            {
              label: '수강 후',
              data: radarData.after,
              backgroundColor: 'rgba(233,69,96,0.2)',
              borderColor: '#e94560',
              borderWidth: 2,
              pointBackgroundColor: '#e94560',
              pointRadius: 4,
            },
          ],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            r: {
              min: 0, max: 5,
              ticks: { stepSize: 1, font: { size: 11 } },
              pointLabels: { font: { size: 13, weight: '600' } },
              grid: { color: 'rgba(0,0,0,.08)' },
              angleLines: { color: 'rgba(0,0,0,.08)' },
            },
          },
        },
      });
    })();

    /* ── 시험 결과 데이터 (OT / 최종 분리) ── */
    const examData = Object.freeze({
      ot: {
        score: 62,
        subjects: [
          { name: 'AI', correct: 5, timeout: 3, unknown: 2, wrong: 2 },
          { name: 'CS', correct: 4, timeout: 3, unknown: 3, wrong: 3 },
          { name: 'Collab', correct: 5, timeout: 2, unknown: 2, wrong: 3 },
        ],
      },
      final: {
        score: 88,
        subjects: [
          { name: 'AI', correct: 8, timeout: 2, unknown: 1, wrong: 1 },
          { name: 'CS', correct: 6, timeout: 3, unknown: 2, wrong: 2 },
          { name: 'Collab', correct: 7, timeout: 1, unknown: 1, wrong: 3 },
          { name: 'Devops', correct: 9, timeout: 1, unknown: 0, wrong: 2 },
          { name: 'Project', correct: 5, timeout: 4, unknown: 2, wrong: 1 },
        ],
      },
    });

    (function buildExamTable() {
      const tbody = document.getElementById('examTableBody');
      if (!tbody) return;
      const toPercent = s => {
        const total = s.correct + s.timeout + s.unknown + s.wrong;
        if (total === 0) return [0, 0, 0, 0];
        return [s.correct, s.timeout, s.unknown, s.wrong].map(v => +(v / total * 100).toFixed(1));
      };
      const colors = ['#22c55e', '#facc15', '#94a3b8', '#f87171'];
      const colorsOt = colors.map(c => {
        const r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b = parseInt(c.slice(5, 7), 16);
        return `rgba(${r},${g},${b},0.4)`;
      });
      const tipLabels = ['정답', '시간초과', '모르겠음', '오답'];
      const makeBar = (pct, isOt) => {
        return `<div class="bar-stack">${pct.map((p, i) =>
          `<div class="bar-seg" data-tip="${tipLabels[i]}: ${p}%" style="width:${p}%;background:${(isOt ? colorsOt : colors)[i]}"></div>`
        ).join('')}</div>`;
      };

      const otByName = {};
      examData.ot.subjects.forEach(s => { otByName[s.name] = s; });

      examData.final.subjects.forEach(s => {
        const otSubject = otByName[s.name];
        const finalPct = toPercent(s);
        const otCell = otSubject
          ? `<td class="col-type ot">사전</td><td class="col-bar">${makeBar(toPercent(otSubject), true)}</td>`
          : `<td class="col-type ot">사전</td><td class="col-bar col-bar-unmeasured"><span class="unmeasured-label">미측정</span></td>`;
        tbody.insertAdjacentHTML('beforeend', `
          <tr class="row-ot">
            <td class="col-subject" rowspan="2">${escapeHtml(s.name)}</td>
            ${otCell}
          </tr>
          <tr>
            <td class="col-type final">최종</td>
            <td class="col-bar">${makeBar(finalPct, false)}</td>
          </tr>
        `);
      });

      // 커스텀 툴팁
      const tooltip = document.getElementById('barTooltip');
      document.querySelectorAll('.bar-seg').forEach(el => {
        el.addEventListener('mouseenter', e => {
          tooltip.textContent = el.dataset.tip;
          tooltip.style.display = 'block';
        });
        el.addEventListener('mousemove', e => {
          tooltip.style.left = (e.clientX + 14) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
        });
        el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      });
    })();

    /* ── 데일리 스크럼 데이터 ── */
    const scrumData = [
      { date: '03/04', problem: '개발 환경 세팅 중 Python 버전 충돌', solution: 'pyenv로 버전 분리 관리', result: '팀 공통 환경 통일 완료' },
      { date: '03/05', problem: 'Git 커밋 컨벤션 미숙', solution: 'Conventional Commits 문서 학습 후 적용', result: '팀 리뷰 통과율 향상' },
      { date: '03/06', problem: 'HTML/CSS 레이아웃 깨짐', solution: 'Flexbox 개념 재학습 후 수정', result: '반응형 레이아웃 완성' },

    /* ── 스크럼 페이지네이션 ── */
    const SCRUM_PAGE_SIZE = 10;
    let currentPage = 1;

    function scrumRowHtml(row) {
      return `<tr>
    <td><span class="date-badge">${escapeHtml(row.date)}</span></td>
    <td>${escapeHtml(row.problem)}</td>
    <td>${escapeHtml(row.solution)}</td>
    <td>${escapeHtml(row.result)}</td>
  </tr>`;
    }

    function renderScrumRows(rows) {
      const tbody = document.getElementById('scrumBody');
      if (!tbody) return;
      tbody.innerHTML = rows.map(scrumRowHtml).join('');
    }

    function renderScrumPage(page) {
      const totalPages = Math.max(1, Math.ceil(scrumData.length / SCRUM_PAGE_SIZE));
      currentPage = Math.max(1, Math.min(page, totalPages));
      const start = (currentPage - 1) * SCRUM_PAGE_SIZE;
      renderScrumRows(scrumData.slice(start, start + SCRUM_PAGE_SIZE));

      const pageInfo = document.getElementById('scrumPageInfo');
      const prevBtn = document.getElementById('scrumPrev');
      const nextBtn = document.getElementById('scrumNext');
      const pagination = document.getElementById('scrumPagination');

      if (pageInfo) pageInfo.textContent = `${currentPage} / ${totalPages}`;
      if (prevBtn) prevBtn.disabled = currentPage === 1;
      if (nextBtn) nextBtn.disabled = currentPage === totalPages;
      // 전체가 한 페이지면 페이지네이션 숨김
      if (pagination) pagination.style.display = totalPages <= 1 ? 'none' : 'flex';
    }

    function moveScrumPage(delta) { renderScrumPage(currentPage + delta); }

    renderScrumPage(1);

    /* ── 포트폴리오 — 스크럼 데이터 기반 자동 생성 ── */
    (function buildPortfolio() {
      const card = document.getElementById('portfolioCard');

        'Chart': 'Chart.js', 'PR': 'GitHub Actions',
      };
      const techSet = new Set();
      scrumData.forEach(({ problem, solution }) => {
        Object.entries(keywordMap).forEach(([kw, tech]) => {
          if (problem.includes(kw) || solution.includes(kw)) techSet.add(tech);
        });
      });
      techSet.add('Python');
      const techs = [...techSet].slice(0, 6);

        .map(s => s.result)
        .filter(r => /\d+[%회초→]/.test(r));

      서버에서 수신한 UTC(협정 세계시) 데이터를 프론트엔드 가공 단계에서 사용자 로컬 시간(KST)으로 변환 후 날짜를 분류하도록 로직 수정함.
      서버에서 클라이언트로의 단방향 통신에 최적화된 SSE를 도입하고, 영상 스트리밍(WebRTC)과 알림 채널(SSE)을 분리함.
    </p>
    <h3>프로젝트 개요</h3>
    <p class="description">
      AEGIS - VLM 기반 실시간 이상행동 감지 및 자율 대응형 AI 관제 에이전트
      VLM이 실시간으로 CCTV 영상을 분석해 이상행동을 감지하면, 자동 요약 리포트를 작성하고 Agent가 스스로 판단하여 대응하는 AI CCTV 관제 시스템.
    </p>
    <h3>주요 기능</h3>
    <p class="description">
      - 실시간 알림 및 통합 대시보드 <br>

      - 사건 이력 관리 <br>
      - 사건 발생 시점의 영상 자동 녹화, 사건 발생 이력 통계 제공 <br>

    /* ── PDF 출력 시 사전 처리 ── */
    window.onbeforeprint = function () {
      // 스크럼 전체 행 렌더링 (페이지네이션 무시)
      renderScrumRows(scrumData);
      // 인라인 스타일이 @media print보다 우선순위가 높으므로 직접 숨김
      const pagination = document.getElementById('scrumPagination');
      if (pagination) pagination.style.display = 'none';
    };
    window.onafterprint = function () {
      renderScrumPage(currentPage);
    };
  </script>
