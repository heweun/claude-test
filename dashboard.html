<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성장 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      color: #fff;
      padding: 36px 48px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #e94560;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: 0.9rem; opacity: .7; margin-top: 4px; }

    /* ── 공통 섹션 ── */
    .section {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }
    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── 레이더 차트 ── */
    .radar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .radar-chart-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }
    .radar-legend {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }
    .legend-dot {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── 시험 결과 ── */
    .score-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .score-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      text-align: center;
    }
    .score-card .label { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
    .score-card .score { font-size: 3rem; font-weight: 800; line-height: 1; }
    .score-card .total { font-size: 0.85rem; color: #999; margin-top: 4px; }
    .score-ot   .score { color: #0f3460; }
    .score-final .score { color: #e94560; }
    .bar-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .bar-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      header { padding: 24px 20px; }
      .section { padding: 0 12px; }
      .score-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="avatar">김</div>
  <div>
    <h1>김수강 · 성장 대시보드</h1>
    <p>풀스택 웹 개발 과정 · 2025년 1분기</p>
  </div>
</header>

<!-- ── 역량 레이더 차트 ── -->
<div class="section">
  <div class="section-title">📡 역량 변화 (수강 전 vs 후)</div>
  <div class="radar-wrap">
    <div class="radar-chart-container">
      <canvas id="radarChart"></canvas>
    </div>
    <div class="radar-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(59,130,246,.6);border:2px solid #3b82f6;"></div>
        <span>수강 전</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(233,69,96,.6);border:2px solid #e94560;"></div>
        <span>수강 후</span>
      </div>
    </div>
  </div>
</div>

<!-- ── 시험 결과 ── -->
<div class="section">
  <div class="section-title">📝 시험 결과</div>
  <div class="score-cards">
    <div class="score-card score-ot">
      <div class="label">OT 시험</div>
      <div class="score">62</div>
      <div class="total">/ 100점</div>
    </div>
    <div class="score-card score-final">
      <div class="label">최종 시험</div>
      <div class="score">88</div>
      <div class="total">/ 100점</div>
    </div>
  </div>
  <div class="bar-wrap">
    <div class="bar-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div><span>정답</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#facc15;"></div><span>시간초과</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8;"></div><span>모르겠음</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#f87171;"></div><span>오답</span></div>
    </div>
    <canvas id="barChart"></canvas>
  </div>
</div>

<div style="height: 48px;"></div>
<script>
/* ── 레이더 데이터 ── */
const radarData = {
  labels: ['알고리즘', '자료구조', '데이터베이스', '네트워크', '운영체제', '협업능력'],
  before: [2, 3, 2, 1, 2, 4],
  after:  [4, 5, 4, 3, 3, 5],
};

(function buildRadar() {
  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  new Chart(canvas.getContext('2d'), {
    type: 'radar',
    data: {
      labels: radarData.labels,
      datasets: [
        {
          label: '수강 전',
          data: radarData.before,
          backgroundColor: 'rgba(59,130,246,0.2)',
          borderColor: '#3b82f6',
          borderWidth: 2,
          pointBackgroundColor: '#3b82f6',
          pointRadius: 4,
        },
        {
          label: '수강 후',
          data: radarData.after,
          backgroundColor: 'rgba(233,69,96,0.2)',
          borderColor: '#e94560',
          borderWidth: 2,
          pointBackgroundColor: '#e94560',
          pointRadius: 4,
        },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 5,
          ticks: { stepSize: 1, font: { size: 11 } },
          pointLabels: { font: { size: 13, weight: '600' } },
          grid: { color: 'rgba(0,0,0,.08)' },
          angleLines: { color: 'rgba(0,0,0,.08)' },
        },
      },
    },
  });
})();

/* ── 시험 결과 데이터 ── */
const examData = {
  ot: 62,
  final: 88,
  subjects: [
    { name: 'Python 기초',  correct: 8, timeout: 2, unknown: 1, wrong: 1 },
    { name: '자료구조',      correct: 6, timeout: 3, unknown: 2, wrong: 2 },
    { name: '데이터베이스',  correct: 7, timeout: 1, unknown: 1, wrong: 3 },
    { name: '웹 프레임워크', correct: 9, timeout: 1, unknown: 0, wrong: 2 },
    { name: '알고리즘',      correct: 5, timeout: 4, unknown: 2, wrong: 1 },
  ],
};

(function buildBar() {
  const canvas = document.getElementById('barChart');
  if (!canvas) return;
  const toPercent = (s) => {
    const total = s.correct + s.timeout + s.unknown + s.wrong;
    return {
      correct: +(s.correct / total * 100).toFixed(1),
      timeout: +(s.timeout / total * 100).toFixed(1),
      unknown: +(s.unknown / total * 100).toFixed(1),
      wrong:   +(s.wrong   / total * 100).toFixed(1),
    };
  };
  const pct = examData.subjects.map(toPercent);
  new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: examData.subjects.map(s => s.name),
      datasets: [
        { label: '정답',    data: pct.map(p => p.correct), backgroundColor: '#22c55e' },
        { label: '시간초과', data: pct.map(p => p.timeout), backgroundColor: '#facc15' },
        { label: '모르겠음', data: pct.map(p => p.unknown), backgroundColor: '#94a3b8' },
        { label: '오답',    data: pct.map(p => p.wrong),   backgroundColor: '#f87171' },
      ],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}%` } },
      },
      scales: {
        x: { stacked: true, max: 100, ticks: { callback: v => v + '%' }, grid: { color: 'rgba(0,0,0,.06)' } },
        y: { stacked: true, grid: { display: false } },
      },
    },
  });
})();
</script>
</body>
</html>
